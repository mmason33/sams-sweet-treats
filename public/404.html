<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Sam's Sweet Treats &amp; Coffee</title>
    <script type="text/javascript">
      // Single Page Apps for GitHub Pages
      // https://github.com/rafgraph/spa-github-pages
      // GitHub Pages serves this file for any unknown path (e.g. a hard refresh
      // on /tv). It rewrites the URL into a form index.html can decode, then
      // redirects there so the SPA router can take over.
      // pathSegmentsToKeep = 1 keeps the "/sams-sweet-treats/" project segment.
      // When moving to a custom domain at the root, set this to 0.
      var pathSegmentsToKeep = 1;

      var l = window.location;
      l.replace(
        l.protocol +
          '//' +
          l.hostname +
          (l.port ? ':' + l.port : '') +
          l.pathname
            .split('/')
            .slice(0, 1 + pathSegmentsToKeep)
            .join('/') +
          '/?/' +
          l.pathname
            .slice(1)
            .split('/')
            .slice(pathSegmentsToKeep)
            .join('/')
            .replace(/&/g, '~and~') +
          (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
          l.hash
      );
    </script>
  </head>
  <body></body>
</html>
